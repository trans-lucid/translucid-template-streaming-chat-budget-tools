name: Template Validation

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Validate solution
        run: npm run validate:solution

      - name: Validate expected starter failure
        run: npm run validate:candidate-main-expected-failure

      - name: Render template
        run: npm run render

      - name: Safety scan
        run: npm run scan:safety

      - name: Rendered repo smoke test
        run: npm run validate:rendered-smoke

      - name: Docker-backed integration expected failure
        run: npm run validate:docker-integration

      - name: Dump Docker logs on failure
        if: failure()
        run: |
          cd candidate
          docker compose logs || true
          docker compose down -v || true

